<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>AgroVision AI</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f4f6f8; margin: 0; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .card { background: white; border-radius: 12px; padding: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        #video-feed { width: 100%; border-radius: 8px; background: #000; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { text-align: left; padding: 12px; border-bottom: 1px solid #eee; }
        .badge { background: #e6f4ea; color: #137333; padding: 4px 10px; border-radius: 12px; font-weight: bold; }
        .chat-response { background: #f8f9fa; padding: 15px; border-radius: 8px; margin-top: 10px; border-left: 4px solid #1a73e8; }
        textarea { width: 100%; height: 60px; padding: 10px; border-radius: 8px; border: 1px solid #ddd; }
        button { background: #1a73e8; color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>AgroVision AI</h1>
        <div class="grid">
            <div class="card">
                <h2>Câmera ao Vivo</h2>
                <img src="/frame" id="live-camera">
            </div>
            <div class="card">
                <h2>Eventos de Hoje</h2>
                <table>
                    <thead><tr><th>Hora</th><th>Tipo</th><th>Ação</th></tr></thead>
                    <tbody>
                        {% for event in events %}
                        <tr>
                            <td>{{ event.event_time }}</td>
                            <td><span class="badge">{{ event.label }}</span></td>
                            <td><a href="{{ event.image_path }}" target="_blank">Ver Foto</a></td>
                        </tr>
                        {% endfor %}
                    </tbody>
                </table>
            </div>
        </div>
        <div class="card" style="margin-top: 20px;">
            <h2>Assistente AgroVision</h2>
            <textarea id="question" placeholder="O que aconteceu ultimamente?"></textarea>
            <button onclick="ask()">Consultar</button>
            <div id="answer" class="chat-response">Aguardando...</div>
        </div>
    </div>
    <script>
        setInterval(() => {
            document.getElementById('live-camera').src = "/frame?t=" + new Date().getTime();
        }, 150);

        async function ask() {
            const q = document.getElementById("question").value;
            const res = await fetch("/chat", {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify({message: q})
            });
            const data = await res.json();
            document.getElementById("answer").innerText = data.answer;
        }
    </script>
</body>
</html>
